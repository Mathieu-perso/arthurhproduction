name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install & Build Application
        run: |
          cd front
          npm install
          npm run build
          
          echo "---- index.html ----"
          cat dist/index.html
          
          cp dist/index.html dist/404.html
          cd ..
          
          mv front/dist ./deployed_site
          
          echo "---- deployed_site ----"
          ls -la deployed_site
          ls -la deployed_site/assets

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deployed_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4